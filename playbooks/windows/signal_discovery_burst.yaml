---
# playbooks/windows/signal_discovery_burst.yaml
# Detection of discovery command bursts

id: "windows_discovery_burst_001"
title: "Discovery Command Burst"
name: "Discovery Burst Detection"
family: "discovery"
version: "2.0"
description: |
  Detects burst of discovery commands often seen in:
  - Post-exploitation reconnaissance
  - Automated attack tools
  - Red team frameworks
  
  Correlates multiple discovery commands within short windows.

enabled: true
confidence_threshold: 0.75

requires:
  - security_log
  - audit_proc_creation

mitre:
  tactics:
    - discovery
  techniques:
    - T1087      # Account Discovery
    - T1016      # System Network Configuration
    - T1033      # System Owner/User Discovery
    - T1069      # Permission Groups Discovery
    - T1082      # System Information Discovery
    - T1083      # File and Directory Discovery

input_facts:
  required:
    - Exec

# Discovery commands to track
discovery_commands:
  user_discovery:
    - "whoami"
    - "net user"
    - "net localgroup"
    - "net group"
    - "quser"
  system_discovery:
    - "hostname"
    - "systeminfo"
    - "ipconfig"
    - "netstat"
  domain_discovery:
    - "nltest"
    - "net domain"
    - "dsquery"
    - "gpresult"
  process_discovery:
    - "tasklist"
    - "wmic process"
    - "query process"

rules:
  - name: "User Discovery Burst"
    window: 60
    aggregation: count
    threshold: 3
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(whoami|net user|net localgroup|quser)"
    actions:
      - severity: HIGH
        tags:
          - "discovery"
          - "user_enum"
          - "recon_burst"
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]
    expected:
      facts:
        - "Multiple user/group enumeration commands in short window"
        - "whoami, net user, net localgroup, or quser execution"
      variants:
        - label: "whoami"
          facts:
            - "whoami /all - detailed user context enumeration"
        - label: "net user"
          facts:
            - "net user - enumerate local user accounts"
        - label: "net localgroup"
          facts:
            - "net localgroup administrators - enumerate admin members"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["whoami", "net user", "net localgroup", "quser"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Network Discovery Burst"
    window: 60
    aggregation: count
    threshold: 3
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(ipconfig|netstat|arp -a|route print|nbtstat)"
    actions:
      - severity: MEDIUM
        tags:
          - "discovery"
          - "network_enum"
    expected:
      facts:
        - "Multiple network enumeration commands in short window"
        - "Network configuration and connection discovery"
      variants:
        - label: "ipconfig"
          facts:
            - "ipconfig /all - network adapter configuration"
        - label: "netstat"
          facts:
            - "netstat -an - active network connections"
        - label: "arp -a"
          facts:
            - "arp -a - ARP cache (local network hosts)"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["ipconfig", "netstat", "arp", "route", "nbtstat"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Domain Discovery Burst"
    window: 60
    aggregation: count
    threshold: 2
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(nltest|dsquery|gpresult|net domain)"
    actions:
      - severity: HIGH
        tags:
          - "discovery"
          - "domain_enum"
          - "ad_recon"
    expected:
      facts:
        - "Active Directory reconnaissance commands"
        - "Domain trust, policy, or structure enumeration"
      variants:
        - label: "nltest"
          facts:
            - "nltest /dclist - domain controller enumeration"
            - "nltest /domain_trusts - trust relationships"
        - label: "dsquery"
          facts:
            - "dsquery user/computer - AD object queries"
        - label: "gpresult"
          facts:
            - "gpresult /r - applied group policies"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["nltest", "dsquery", "gpresult", "net domain"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Combined Discovery Activity"
    window: 300
    aggregation: count
    threshold: 5
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(whoami|hostname|ipconfig|systeminfo|tasklist|net user|net localgroup|nltest)"
    actions:
      - severity: CRITICAL
        tags:
          - "discovery_burst"
          - "attack_framework"
          - "post_exploitation"
    expected:
      facts:
        - "5+ discovery commands within 5 minutes"
        - "Pattern consistent with automated attack framework"
        - "Post-exploitation reconnaissance burst"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["whoami", "hostname", "ipconfig", "systeminfo", "tasklist", "nltest"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "Discovery Burst Detected"
    priority: "high"

false_positives:
  - "IT administrators troubleshooting"
  - "Deployment scripts with inventory commands"
