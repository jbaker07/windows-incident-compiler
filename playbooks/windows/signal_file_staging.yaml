---
# playbooks/windows/signal_file_staging.yaml
# Detection of file staging activity

id: "windows_file_staging_001"
title: "File Staging Detection"
name: "File Staging Detection"
family: "collection"
version: "2.0"
description: |
  Detects file staging activity for exfiltration:
  - Archive creation (7z, zip, rar)
  - Staging in temp directories
  - Large file operations
  - Compression utilities execution

enabled: true
confidence_threshold: 0.70

requires:
  - security_log
  - audit_proc_creation

enhances_with:
  - sysmon

mitre:
  tactics:
    - collection
    - exfiltration
  techniques:
    - T1560.001  # Archive via Utility
    - T1074      # Data Staged

input_facts:
  required:
    - Exec
  optional:
    - CreatePath

rules:
  - name: "Archive Utility Execution"
    window: 60
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)(7z|7za|winrar|rar|winzip|zip)\\.exe"
    actions:
      - severity: MEDIUM
        tags:
          - "archive_creation"
          - "staging"
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]
    expected:
      facts:
        - "Archive utility execution (7z, WinRAR, WinZip)"
        - "Potential data collection for exfiltration"
      variants:
        - label: "7-Zip"
          facts:
            - "7z.exe or 7za.exe creating archive"
        - label: "WinRAR"
          facts:
            - "rar.exe or winrar.exe archive operation"
        - label: "WinZip"
          facts:
            - "winzip.exe compression activity"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["7z", "7za", "rar", "winrar", "winzip", "zip"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "PowerShell Compress-Archive"
    window: 60
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)powershell"
      - field: cmdline
        matches: "(?i)compress-archive"
    actions:
      - severity: MEDIUM
        tags:
          - "powershell_archive"
          - "staging"
    expected:
      facts:
        - "PowerShell Compress-Archive cmdlet execution"
        - "Native PowerShell ZIP archive creation"
      evidence:
        lens: "script"
        fact_types: ["Exec", "ScriptExec"]
        query_terms: ["powershell", "Compress-Archive", "zip"]
        event_ids: [4688, 1, 4104]
      visibility_requires: ["security_log"]

  - name: "Archive Creation in Temp"
    window: 60
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(7z|rar|zip).*\\\\temp\\\\"
    actions:
      - severity: HIGH
        tags:
          - "temp_staging"
          - "exfiltration_prep"
    expected:
      facts:
        - "Archive creation targeting temp directory"
        - "Suspicious staging location for exfiltration"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["7z", "rar", "zip", "temp"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Archive with Password"
    window: 60
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(7z|rar).*-p"
    actions:
      - severity: HIGH
        tags:
          - "encrypted_archive"
          - "data_protection"
    expected:
      facts:
        - "Password-protected archive creation (-p flag)"
        - "Encrypted data staging for exfiltration"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["7z", "rar", "-p", "password"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "File Staging Detected"
    priority: "medium"

false_positives:
  - "IT backup operations"
  - "Developer build processes"
