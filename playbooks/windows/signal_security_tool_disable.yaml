---
# playbooks/windows/signal_security_tool_disable.yaml
# Detection of security tool disabling

id: "windows_security_disable_001"
title: "Security Tool Disable"
name: "Security Tool Disable Detection"
family: "defense_evasion"
version: "2.0"
description: |
  Detects attempts to disable security tools:
  - Windows Defender manipulation
  - Firewall disable
  - Event logging disable
  - EDR/AV service termination

enabled: true
confidence_threshold: 0.90

requires:
  - security_log
  - audit_proc_creation

mitre:
  tactics:
    - defense_evasion
  techniques:
    - T1562.001  # Disable or Modify Tools
    - T1562.004  # Disable Windows Event Logging

input_facts:
  required:
    - Exec
  optional:
    - SecurityToolDisable

rules:
  - name: "Disable Windows Defender"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(set-mppreference.*-disablerealtimemonitoring|sc.*stop.*windefend|net.*stop.*windefend)"
    actions:
      - severity: CRITICAL
        tags:
          - "defender_disable"
          - "evasion"
    expected:
      facts:
        - "Windows Defender disabled via Set-MpPreference, sc stop, or net stop"
        - "Security tool disabling - defense evasion prior to malicious activity"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["set-mppreference", "disablerealtimemonitoring", "windefend", "stop"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]

  - name: "Disable Windows Firewall"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(netsh.*firewall.*set.*opmode.*disable|netsh.*advfirewall.*set.*state.*off)"
    actions:
      - severity: HIGH
        tags:
          - "firewall_disable"
          - "evasion"
    expected:
      facts:
        - "Windows Firewall disabled via netsh firewall or advfirewall command"
        - "Network security control disabled - enables unrestricted network access"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["netsh", "firewall", "advfirewall", "disable", "off"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Stop Event Log Service"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(sc.*stop.*eventlog|net.*stop.*eventlog)"
    actions:
      - severity: CRITICAL
        tags:
          - "logging_disable"
          - "anti_forensics"
    expected:
      facts:
        - "Event Log service stopped via sc or net command"
        - "Anti-forensics activity - disabling audit logging"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["sc", "net", "stop", "eventlog"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Disable AMSI"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(amsiInitFailed|amsi\\.dll|amsiscanbuffer)"
    actions:
      - severity: CRITICAL
        tags:
          - "amsi_bypass"
          - "evasion"
    expected:
      facts:
        - "AMSI bypass technique detected (amsiInitFailed, amsi.dll manipulation, AmsiScanBuffer)"
        - "Antimalware Scan Interface bypass - enables execution of malicious scripts"
      evidence:
        lens: "script"
        fact_types: ["Exec", "ScriptExec"]
        query_terms: ["amsiInitFailed", "amsi.dll", "AmsiScanBuffer", "bypass"]
        event_ids: [4688, 4104, 1]
      visibility_requires: ["security_log"]

  - name: "Kill Security Process"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)taskkill.*/f.*(msmpeng|mssense|savservice|avp|mbam)"
    actions:
      - severity: CRITICAL
        tags:
          - "security_kill"
          - "evasion"
    expected:
      facts:
        - "taskkill /f targeting security process (Defender/Sense/Sophos/Kaspersky/Malwarebytes)"
        - "Forceful termination of security/AV processes"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["taskkill", "msmpeng", "mssense", "savservice", "avp", "mbam"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "Security Tool Disable Attempt"
    priority: "critical"

false_positives:
  - "Authorized maintenance"
  - "Software installation requiring temp disable"
