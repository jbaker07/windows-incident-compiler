---
# playbooks/windows/signal_powershell_download.yaml
# Detection of PowerShell download patterns

id: "windows_powershell_download_001"
title: "PowerShell Download Activity"
name: "PowerShell Download Detection"
family: "execution"
version: "2.0"
description: |
  Detects PowerShell download patterns including:
  - WebClient download methods
  - Invoke-WebRequest
  - BITS transfers via PowerShell
  - Net.WebClient object creation

enabled: true
confidence_threshold: 0.80

requires:
  - security_log
  - audit_proc_creation

enhances_with:
  - powershell_logging

mitre:
  tactics:
    - command_and_control
    - execution
  techniques:
    - T1059.001  # PowerShell
    - T1105      # Ingress Tool Transfer

input_facts:
  required:
    - Exec
  optional:
    - ScriptExec

slots:
  required:
    - name: process_name
      type: string
      pattern: "(?i)powershell\\.exe|pwsh\\.exe"
  optional:
    - name: download_method
      type: string
      pattern: "(?i)downloadstring|downloadfile|webclient|invoke-webrequest|iwr|curl|wget"

rules:
  - name: "PowerShell DownloadString"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)powershell|pwsh"
      - field: cmdline
        matches: "(?i)downloadstring.*https?://"
    actions:
      - severity: HIGH
        tags:
          - "download"
          - "powershell"
          - "dropper"
    expected:
      facts:
        - "PowerShell WebClient.DownloadString() method with HTTP/HTTPS URL"
        - "Downloading and potentially executing remote content"
      evidence:
        lens: "script"
        fact_types: ["Exec", "ScriptExec"]
        query_terms: ["downloadstring", "webclient", "http", "https"]
        event_ids: [4688, 1, 4104]
      visibility_requires: ["security_log"]
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]

  - name: "PowerShell DownloadFile"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)powershell|pwsh"
      - field: cmdline
        matches: "(?i)downloadfile.*https?://"
    actions:
      - severity: HIGH
        tags:
          - "file_download"
          - "staging"
    expected:
      facts:
        - "PowerShell WebClient.DownloadFile() method with HTTP/HTTPS URL"
        - "File staging from remote location to disk"
      evidence:
        lens: "script"
        fact_types: ["Exec", "ScriptExec"]
        query_terms: ["downloadfile", "webclient", "http", "https"]
        event_ids: [4688, 1, 4104]
      visibility_requires: ["security_log"]

  - name: "PowerShell Invoke-WebRequest"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)powershell|pwsh"
      - field: cmdline
        matches: "(?i)(invoke-webrequest|iwr|curl|wget).*https?://"
    actions:
      - severity: MEDIUM
        tags:
          - "web_request"
          - "download"
    expected:
      facts:
        - "PowerShell Invoke-WebRequest (or aliases iwr/curl/wget) with URL"
        - "Web request to external resource - potential payload download"
      evidence:
        lens: "script"
        fact_types: ["Exec", "ScriptExec"]
        query_terms: ["invoke-webrequest", "iwr", "curl", "wget", "http"]
        event_ids: [4688, 1, 4104]
      visibility_requires: ["security_log"]

  - name: "PowerShell IEX Download Cradle"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)powershell|pwsh"
      - field: cmdline
        matches: "(?i)iex.*(downloadstring|webclient|webrequest)"
    actions:
      - severity: CRITICAL
        tags:
          - "download_cradle"
          - "fileless"
          - "immediate_exec"
    expected:
      facts:
        - "PowerShell IEX (Invoke-Expression) with download cradle pattern"
        - "Fileless malware execution - downloading and immediately executing code"
      evidence:
        lens: "script"
        fact_types: ["Exec", "ScriptExec"]
        query_terms: ["iex", "invoke-expression", "downloadstring", "webclient"]
        event_ids: [4688, 1, 4104]
      visibility_requires: ["security_log"]

  - name: "PowerShell Start-BitsTransfer"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)powershell|pwsh"
      - field: cmdline
        matches: "(?i)start-bitstransfer.*https?://"
    actions:
      - severity: HIGH
        tags:
          - "bits_download"
          - "evasion"
    expected:
      facts:
        - "PowerShell Start-BitsTransfer command with URL"
        - "Using BITS for file download - common evasion technique"
      evidence:
        lens: "script"
        fact_types: ["Exec", "ScriptExec"]
        query_terms: ["start-bitstransfer", "bits", "http", "https"]
        event_ids: [4688, 1, 4104]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "PowerShell Download Detected"
    priority: "high"

false_positives:
  - "IT automation scripts"
  - "Package managers (chocolatey, nuget)"
