---
# playbooks/windows/signal_net_command_abuse.yaml
# Detection of net.exe command abuse

id: "windows_net_command_001"
title: "Net Command Abuse"
name: "Net Command Detection"
family: "discovery"
version: "2.0"
description: |
  Detects suspicious net.exe usage for:
  - User/group enumeration
  - Share enumeration
  - Session management
  - Account manipulation

enabled: true
confidence_threshold: 0.70

requires:
  - security_log
  - audit_proc_creation

mitre:
  tactics:
    - discovery
    - lateral_movement
    - persistence
  techniques:
    - T1087      # Account Discovery
    - T1069      # Permission Groups Discovery
    - T1135      # Network Share Discovery
    - T1136      # Create Account

input_facts:
  required:
    - Exec

slots:
  required:
    - name: process_name
      type: string
      pattern: "(?i)net\\.exe|net1\\.exe"
  optional:
    - name: subcommand
      type: string
      pattern: "(?i)user|localgroup|group|share|session|use"

rules:
  - name: "Net User Add"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)net(1)?\\.exe"
      - field: cmdline
        matches: "(?i)\\buser\\b.*/add"
    actions:
      - severity: HIGH
        tags:
          - "account_creation"
          - "persistence"
    expected:
      facts:
        - "net.exe user /add command - creating new local user account"
        - "Potential persistence via account creation"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["net", "user", "/add", "net1"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]

  - name: "Net Localgroup Add"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)net(1)?\\.exe"
      - field: cmdline
        matches: "(?i)\\blocalgroup\\b.*/add"
    actions:
      - severity: HIGH
        tags:
          - "group_modification"
          - "privilege_escalation"
    expected:
      facts:
        - "net.exe localgroup /add command - adding user to local group"
        - "Potential privilege escalation via group membership change"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["net", "localgroup", "/add", "administrators"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Net Share Enumeration"
    window: 60
    aggregation: count
    threshold: 2
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)net(1)?\\.exe"
      - field: cmdline
        matches: "(?i)\\bshare\\b|\\bview\\b"
    actions:
      - severity: MEDIUM
        tags:
          - "share_enum"
          - "discovery"
    expected:
      facts:
        - "net.exe share or view command - network share enumeration"
        - "Discovery activity to identify accessible network shares"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["net", "share", "view", "net1"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Net Use Remote Connection"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)net(1)?\\.exe"
      - field: cmdline
        matches: "(?i)\\buse\\b.*\\\\\\\\.*[$]"
    actions:
      - severity: HIGH
        tags:
          - "lateral_movement"
          - "admin_share"
    expected:
      facts:
        - "net.exe use command connecting to admin share (C$, ADMIN$, IPC$)"
        - "Lateral movement via administrative share connection"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["net", "use", "C$", "ADMIN$", "IPC$"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Net Session Clear"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)net(1)?\\.exe"
      - field: cmdline
        matches: "(?i)\\bsession\\b.*/delete"
    actions:
      - severity: MEDIUM
        tags:
          - "session_cleanup"
          - "anti_forensics"
    expected:
      facts:
        - "net.exe session /delete command - clearing network sessions"
        - "Anti-forensics activity clearing evidence of network connections"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["net", "session", "/delete"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Net Password Change"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)net(1)?\\.exe"
      - field: cmdline
        matches: "(?i)\\buser\\b.*\\*"
    actions:
      - severity: HIGH
        tags:
          - "password_change"
          - "credential_modification"
    expected:
      facts:
        - "net.exe user command with password parameter"
        - "Account credential modification via command line"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["net", "user", "password"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "Net Command Abuse Detected"
    priority: "high"

false_positives:
  - "IT administrators managing users/shares"
  - "Domain join operations"
