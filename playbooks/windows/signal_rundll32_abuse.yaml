---
# playbooks/windows/signal_rundll32_abuse.yaml
# Detection of rundll32.exe abuse

id: "windows_rundll32_abuse_001"
title: "Rundll32 LOLBin Abuse"
name: "Rundll32 Abuse Detection"
family: "execution"
version: "2.0"
description: |
  Detects abuse of rundll32.exe for:
  - DLL proxy execution
  - JavaScript execution via url.dll
  - Shell32 abuse patterns
  - Comsvcs MiniDump (credential theft)

enabled: true
confidence_threshold: 0.80

requires:
  - security_log
  - audit_proc_creation

mitre:
  tactics:
    - defense_evasion
    - execution
  techniques:
    - T1218.011  # Rundll32

input_facts:
  required:
    - Exec

slots:
  required:
    - name: process_name
      type: string
      pattern: "(?i)rundll32\\.exe"
  optional:
    - name: script_execution
      type: string
      pattern: "(?i)javascript:|shell32\\.dll.*shellexec_rundll|url\\.dll.*fileprotocolhandler"
    - name: credential_dump
      type: string
      pattern: "(?i)comsvcs\\.dll.*minidump|comsvcs\\.dll.*#24"

rules:
  - name: "Rundll32 JavaScript Execution"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)rundll32"
      - field: cmdline
        matches: "(?i)javascript:"
    actions:
      - severity: CRITICAL
        tags:
          - "script_execution"
          - "lolbin"
    expected:
      facts:
        - "rundll32.exe executing JavaScript code via javascript: protocol"
        - "LOLBin abuse for script execution bypassing controls"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["rundll32", "javascript", "script"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]

  - name: "Rundll32 URL Protocol Handler"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)rundll32"
      - field: cmdline
        matches: "(?i)url\\.dll.*fileprotocolhandler"
    actions:
      - severity: HIGH
        tags:
          - "url_execution"
          - "download"
    expected:
      facts:
        - "rundll32.exe with url.dll FileProtocolHandler - opening URL/file"
        - "Potential download or file execution via URL handler"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["rundll32", "url.dll", "fileprotocolhandler"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Rundll32 Comsvcs MiniDump"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)rundll32"
      - field: cmdline
        matches: "(?i)comsvcs.*minidump|comsvcs.*#24"
    actions:
      - severity: CRITICAL
        tags:
          - "credential_theft"
          - "memory_dump"
          - "lsass_dump"
    expected:
      facts:
        - "rundll32.exe with comsvcs.dll MiniDump - LSASS credential dumping"
        - "Credential theft technique using native Windows DLL for memory dump"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["rundll32", "comsvcs", "minidump", "lsass", "#24"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Rundll32 DLL from Temp"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)rundll32"
      - field: cmdline
        matches: "(?i)(\\\\temp\\\\|\\\\appdata\\\\|%temp%|%appdata%).*\\.dll"
    actions:
      - severity: HIGH
        tags:
          - "suspicious_location"
          - "dropper"
    expected:
      facts:
        - "rundll32.exe loading DLL from TEMP or APPDATA directory"
        - "Suspicious DLL execution from temporary location"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["rundll32", "temp", "appdata", ".dll"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "Rundll32 Abuse Detected"
    priority: "high"

false_positives:
  - "Some legitimate software uses rundll32 for DLL execution"
  - "Windows shell operations via Shell32.dll"
