---
# playbooks/windows/signal_sc_abuse.yaml
# Detection of sc.exe abuse for service manipulation

id: "windows_sc_abuse_001"
title: "SC Service Manipulation"
name: "SC.exe Abuse Detection"
family: "persistence"
version: "2.0"
description: |
  Detects abuse of sc.exe for:
  - Malicious service creation
  - Security service manipulation
  - Lateral movement via service
  - Privilege escalation via service

enabled: true
confidence_threshold: 0.75

requires:
  - security_log
  - audit_proc_creation

mitre:
  tactics:
    - persistence
    - privilege_escalation
    - defense_evasion
  techniques:
    - T1543.003  # Windows Service
    - T1562.001  # Disable Security Tools

input_facts:
  required:
    - Exec
  optional:
    - PersistArtifact

slots:
  required:
    - name: process_name
      type: string
      pattern: "(?i)sc\\.exe"
  optional:
    - name: create_flag
      type: string
      pattern: "(?i)\\bcreate\\b"
    - name: config_flag
      type: string
      pattern: "(?i)\\bconfig\\b"
    - name: stop_flag
      type: string
      pattern: "(?i)\\bstop\\b"

rules:
  - name: "Service Creation"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)sc(\\.exe)?"
      - field: cmdline
        matches: "(?i)\\bcreate\\b.*binpath"
    actions:
      - severity: HIGH
        tags:
          - "service_creation"
          - "persistence"
    expected:
      facts:
        - "sc.exe create command with binPath - new service installation"
        - "Service-based persistence mechanism being established"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["sc", "create", "binpath", "service"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]

  - name: "Security Service Stop"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)sc(\\.exe)?"
      - field: cmdline
        matches: "(?i)\\bstop\\b.*(windefend|mpssvc|wscsvc|wuauserv|eventlog|sense)"
    actions:
      - severity: CRITICAL
        tags:
          - "defense_evasion"
          - "security_disable"
    expected:
      facts:
        - "sc.exe stop command targeting security service (Defender/Firewall/EventLog)"
        - "Attempt to disable security controls before malicious activity"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["sc", "stop", "windefend", "mpssvc", "eventlog", "sense"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Service Binary Path Change"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)sc(\\.exe)?"
      - field: cmdline
        matches: "(?i)\\bconfig\\b.*binpath"
    actions:
      - severity: HIGH
        tags:
          - "service_hijack"
          - "persistence"
    expected:
      facts:
        - "sc.exe config command modifying service binPath"
        - "Service binary path hijacking for persistence or privilege escalation"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["sc", "config", "binpath", "service"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Remote Service Creation"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)sc(\\.exe)?"
      - field: cmdline
        matches: "(?i)\\\\\\\\.*\\bcreate\\b"
    actions:
      - severity: CRITICAL
        tags:
          - "lateral_movement"
          - "remote_service"
    expected:
      facts:
        - "sc.exe create on remote host (\\\\hostname pattern)"
        - "Lateral movement via remote service creation"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["sc", "create", "remote", "\\\\"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Service from Suspicious Path"
    window: 10
    conditions:
      - fact_type: Exec
      - field: path
        matches: "(?i)sc(\\.exe)?"
      - field: cmdline
        matches: "(?i)binpath.*(%temp%|\\\\temp\\\\|\\\\appdata\\\\|\\\\users\\\\public)"
    actions:
      - severity: CRITICAL
        tags:
          - "suspicious_location"
          - "malware"
    expected:
      facts:
        - "sc.exe service creation with binPath in TEMP/APPDATA/Public folder"
        - "Malware indicator - service binary in suspicious writeable location"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["sc", "binpath", "temp", "appdata", "public"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "SC.exe Abuse Detected"
    priority: "high"

false_positives:
  - "IT administrators managing services"
  - "Software installation scripts"
