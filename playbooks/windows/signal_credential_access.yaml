---
# playbooks/windows/signal_credential_access.yaml
# Detection of credential access attempts

id: "windows_credential_access_001"
title: "Credential Access Detection"
name: "Credential Access Detection"
family: "credential_access"
version: "2.1"
description: |
  Detects credential access attempts including:
  - LSASS memory access via ProcessAccess (Sysmon Event 10)
  - SAM database access
  - Credential dumping tools
  - NTDS.dit access
  
  NOTE: ProcessAccess detection REQUIRES Sysmon with Event ID 10 enabled.
  Command-line pattern detection requires Security/Sysmon Event 1.

enabled: true
confidence_threshold: 0.90

requires:
  - sysmon  # Required for ProcessAccess (Event ID 10)

enhances_with:
  - security_log

mitre:
  tactics:
    - credential_access
  techniques:
    - T1003.001  # LSASS Memory
    - T1003.002  # SAM
    - T1003.003  # NTDS

input_facts:
  required:
    - Exec
  optional:
    - ProcessAccess  # Sysmon Event 10 - LSASS process access

slots:
  optional:
    - name: lsass_target
      type: string
      pattern: "(?i)lsass"
    - name: sam_access
      type: string
      pattern: "(?i)sam|security|system"

rules:
  - name: "LSASS Memory Dump Tool"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)(procdump|mimikatz|sekurlsa|logonpasswords|lsadump)"
    actions:
      - severity: CRITICAL
        tags:
          - "credential_dump"
          - "lsass"
          - "mimikatz"
    evidence:
      - event_type: "process_creation"
        event_id: [4688, 1]
    expected:
      facts:
        - "Process execution targeting LSASS memory"
        - "Known credential dumping tool in command line"
      variants:
        - label: "Procdump LSASS Dump"
          facts:
            - "procdump.exe -ma lsass.exe <output_file>"
        - label: "Mimikatz sekurlsa"
          facts:
            - "mimikatz.exe with sekurlsa::logonpasswords command"
        - label: "ProcDump via comsvcs"
          facts:
            - "rundll32.exe comsvcs.dll MiniDump targeting LSASS PID"
      evidence:
        lens: "process"
        fact_types: ["Exec", "ProcessAccess"]
        query_terms: ["lsass", "procdump", "mimikatz", "sekurlsa"]
        event_ids: [4688, 1, 10]
      visibility_requires: ["sysmon"]

  - name: "SAM Registry Export"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)reg.*(save|export).*(sam|security|system)"
    actions:
      - severity: CRITICAL
        tags:
          - "sam_export"
          - "offline_attack"
    expected:
      facts:
        - "reg.exe save/export command for SAM, SECURITY, or SYSTEM hive"
        - "Offline credential extraction preparation"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["reg", "save", "sam", "security", "system"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Shadow Copy NTDS Access"
    window: 60
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)ntds\\.dit|vssadmin.*create\\s+shadow"
    actions:
      - severity: CRITICAL
        tags:
          - "ntds_theft"
          - "domain_compromise"
    expected:
      facts:
        - "Access to ntds.dit (Active Directory database)"
        - "vssadmin.exe creating shadow copy for NTDS extraction"
      variants:
        - label: "Direct NTDS.dit Access"
          facts:
            - "Copy or access of ntds.dit file path"
        - label: "VSS Shadow Copy Creation"
          facts:
            - "vssadmin.exe create shadow /for=C:"
      evidence:
        lens: "process"
        fact_types: ["Exec", "FileAccess"]
        query_terms: ["ntds.dit", "vssadmin", "shadow"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Comsvcs LSASS Dump"
    window: 10
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)rundll32.*comsvcs.*(minidump|#24).*lsass"
    actions:
      - severity: CRITICAL
        tags:
          - "lsass_dump"
          - "lolbin"
    expected:
      facts:
        - "rundll32.exe loading comsvcs.dll for MiniDump"
        - "LSASS process targeted for memory dump"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["rundll32", "comsvcs", "MiniDump", "lsass"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

  - name: "Credential Manager Query"
    window: 60
    aggregation: count
    threshold: 3
    conditions:
      - fact_type: Exec
      - field: cmdline
        matches: "(?i)cmdkey|vaultcmd"
    actions:
      - severity: MEDIUM
        tags:
          - "credential_enum"
    expected:
      facts:
        - "cmdkey.exe or vaultcmd.exe execution"
        - "Enumeration of stored Windows credentials"
      variants:
        - label: "cmdkey list"
          facts:
            - "cmdkey.exe /list - enumerate stored credentials"
        - label: "vaultcmd list"
          facts:
            - "vaultcmd.exe /listcreds - list Credential Manager entries"
      evidence:
        lens: "process"
        fact_types: ["Exec"]
        query_terms: ["cmdkey", "vaultcmd", "/list"]
        event_ids: [4688, 1]
      visibility_requires: ["security_log"]

response:
  - type: "alert"
    channel: "siem"
    title: "Credential Access Attempt"
    priority: "critical"

false_positives:
  - "Legitimate admin backup of SAM"
  - "Authorized penetration testing"
