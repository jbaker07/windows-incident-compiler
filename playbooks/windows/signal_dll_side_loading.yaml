---
# playbooks/windows/signal_dll_side_loading.yaml
# Detection of DLL side-loading and search order hijacking

id: "windows_dll_sideload_001"
title: "DLL Side-Loading Detection"
name: "DLL Side-Loading Detection"
family: "persistence"
version: "2.0"
description: |
  Detects DLL side-loading attempts where:
  - Legitimate executables load malicious DLLs
  - DLLs loaded from non-standard paths
  - Known side-loading targets (Teams, OneDrive, etc.)

enabled: true
confidence_threshold: 0.75

requires:
  - sysmon

mitre:
  tactics:
    - defense_evasion
    - persistence
  techniques:
    - T1574.001  # DLL Search Order Hijacking
    - T1574.002  # DLL Side-Loading

input_facts:
  required:
    - ModuleLoad
  optional:
    - Exec

slots:
  optional:
    - name: dll_path
      type: string
      pattern: "(?i)(\\\\temp\\\\|\\\\appdata\\\\|\\\\public\\\\|\\\\downloads\\\\).*\\.dll"
    - name: known_target
      type: string
      pattern: "(?i)(teams|onedrive|chrome|firefox|slack)\\.exe"

rules:
  - name: "DLL from Temp Directory"
    window: 10
    conditions:
      - fact_type: ModuleLoad
      - field: path
        matches: "(?i)(\\\\temp\\\\|%temp%).*\\.dll"
    actions:
      - severity: HIGH
        tags:
          - "dll_sideload"
          - "suspicious_location"
    evidence:
      - event_type: "image_load"
        event_id: 7
    expected:
      facts:
        - "DLL loaded from temp directory (%TEMP% or \\Temp\\)"
        - "Sysmon Event 7 - Image loaded from suspicious path"
      evidence:
        lens: "process"
        fact_types: ["ModuleLoad"]
        query_terms: ["temp", ".dll", "ImageLoaded"]
        event_ids: [7]
      visibility_requires: ["sysmon"]

  - name: "DLL from User Writable Path"
    window: 10
    conditions:
      - fact_type: ModuleLoad
      - field: path
        matches: "(?i)(\\\\users\\\\.*\\\\appdata\\\\|\\\\programdata\\\\)(?!microsoft).*\\.dll"
    actions:
      - severity: MEDIUM
        tags:
          - "user_writable_dll"
          - "potential_hijack"
    expected:
      facts:
        - "DLL loaded from user-writable AppData or ProgramData path"
        - "Potential DLL search order hijacking"
      evidence:
        lens: "process"
        fact_types: ["ModuleLoad"]
        query_terms: ["AppData", "ProgramData", ".dll", "ImageLoaded"]
        event_ids: [7]
      visibility_requires: ["sysmon"]

  - name: "Unsigned DLL Load"
    window: 10
    conditions:
      - fact_type: ModuleLoad
      - field: signer
        equals: null
      - field: path
        not_matches: "(?i)\\\\windows\\\\"
    actions:
      - severity: MEDIUM
        tags:
          - "unsigned_dll"
          - "verification"
    expected:
      facts:
        - "Unsigned DLL loaded from non-Windows directory"
        - "Missing digital signature on loaded module"
      evidence:
        lens: "process"
        fact_types: ["ModuleLoad"]
        query_terms: ["unsigned", "ImageLoaded", "Signed:false"]
        event_ids: [7]
      visibility_requires: ["sysmon"]

response:
  - type: "alert"
    channel: "siem"
    title: "DLL Side-Loading Detected"
    priority: "high"

false_positives:
  - "Development environments"
  - "Portable applications"
